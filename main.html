<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profit Split Calculator</title>
<style>
    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0f0f0f;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #fff;
    }

    .card {
        background: #1c1c1e;
        padding: 25px;
        border-radius: 20px;
        width: 350px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h2 {
        margin-bottom: 15px;
        font-weight: 500;
    }

    input {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: none;
        outline: none;
        background: #2c2c2e;
        color: white;
        font-size: 16px;
        margin-bottom: 15px;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 12px;
        background: #0a84ff;
        color: white;
        font-size: 16px;
        cursor: pointer;
        margin-bottom: 10px;
    }

    button:hover {
        background: #0066cc;
    }

    .box {
        background: #2c2c2e;
        padding: 10px;
        border-radius: 10px;
        margin-top: 8px;
        display: flex;
        justify-content: space-between;
    }

    .history {
        margin-top: 15px;
        max-height: 150px;
        overflow-y: auto;
        font-size: 14px;
    }

    .history-item {
        background: #2c2c2e;
        padding: 8px;
        border-radius: 8px;
        margin-top: 6px;
    }

    .green { color: #30d158; }
    .blue { color: #0a84ff; }
    .orange { color: #ff9f0a; }

    .clear {
        background: #ff3b30;
    }
</style>
</head>
<body>

<div class="card">
    <h2>Profit Split</h2>

    <input type="number" id="profit" placeholder="Enter profit ₹">

    <button onclick="calculate()">Calculate</button>
    <button class="clear" onclick="clearHistory()">Clear History</button>

    <div id="result"></div>

    <div class="history" id="history"></div>
</div>

<script>
function calculate() {
    let profit = document.getElementById("profit").value;

    if (profit === "" || profit <= 0) {
        alert("Enter valid amount");
        return;
    }

    let trading = Math.round(profit * 0.5);
    let investment = Math.round(profit * 0.3);
    let reward = Math.round(profit * 0.2);

    document.getElementById("result").innerHTML = `
        <div class="box"><span class="green">Trading</span><span>₹${trading}</span></div>
        <div class="box"><span class="blue">Investment</span><span>₹${investment}</span></div>
        <div class="box"><span class="orange">Reward</span><span>₹${reward}</span></div>
    `;

    let entry = `₹${profit} → T:${trading} | I:${investment} | R:${reward}`;

    let history = JSON.parse(localStorage.getItem("history")) || [];
    history.unshift(entry);
    localStorage.setItem("history", JSON.stringify(history));

    displayHistory();
}

function displayHistory() {
    let history = JSON.parse(localStorage.getItem("history")) || [];
    let historyDiv = document.getElementById("history");

    historyDiv.innerHTML = "<h3 style='margin-top:10px;'>History</h3>";

    history.forEach(item => {
        historyDiv.innerHTML += `<div class="history-item">${item}</div>`;
    });
}

function clearHistory() {
    localStorage.removeItem("history");
    displayHistory();
}

displayHistory();
</script>

</body>
</html>
